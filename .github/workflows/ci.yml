name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    name: Lint, security, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]" black bandit hypothesis

      - name: black
        run: black --check .

      - name: bandit
        run: bandit -r fieldworks/ -ll

      - name: pytest
        run: pytest
